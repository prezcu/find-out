spring.application.name=app-backend
# Server Port
server.port=8080

# Supabase PostgreSQL Configuration
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=spring_user.${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Explicitly tell Hibernate to use PostgreSQL to bypass the metadata check
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate (JPA) settings - Automatically creates tables based on your Java models
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT signing secret. MUST be at least 32 bytes. Override in production via env var:
#   export JWT_SECRET="<long random string>"
# The default below is a dev-only placeholder; do not ship it.
security.jwt.secret=${JWT_SECRET:dev-only-change-me-please-change-me-32b!!}
security.jwt.ttl-seconds=3600